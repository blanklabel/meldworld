# MELDWORLD tunable constants (CANON.md §B / §D). Owned by T1.
#
# Working agreement #2: NO gameplay number appears as a literal in any crate.
# Formula *structure* is code; formula *coefficients* live here. Only the subset
# the today-slice actually reads is present; more land as their systems do.

[session]
heartbeat_interval_ms = 5000     # CANON D-session; realtime-protocol session.md
grace_window_ms = 10000          # CANON §B disconnect grace
auth_timeout_ms = 5000           # first message must be session.authenticate
realtime_ticket_ttl_ms = 60000   # auth-players.md: ticket expires 60s after issue

[auth]
bcrypt_cost = 12                 # CANON D17
session_token_ttl_secs = 86400   # 24h

[world]
chunk_size = 64                  # CANON §G Chunk (64x64)
interest_radius_chunks = 2       # CANON §B networking
overworld_sim_hz = 20            # CANON §B
snapshot_hz = 10                 # CANON §B
touch_radius_tiles = 1.0         # contact distance to trigger a battle (spec-defined)
interaction_radius_tiles = 2.5   # range to use a portal/drop/etc. (~2-tile, limits.md) [TUNABLE]
avatar_speed_tiles_per_sec = 6.0 # overworld walk speed (spec-defined)

[runs]
# base_run_level(hub) = round(1 + hub.distance * base_run_level_per_distance)
base_run_level_per_distance = 0.078   # CANON §B -> Center=1, D500=40
backpack_slots = 40                   # limits.md
# Extraction channel duration. Spec default is 10000 (10s, interruptible);
# shortened here for snappy runs/tests. [TUNABLE]
extraction_channel_ms = 2500

[battle]
tick_ms = 100                    # CANON §B ATB tick
# gauge += speed_stat / divisor per 100ms tick; a turn fires at gauge 1.0.
# 4400 → a speed-110 squire acts every ~4.0s and the speed-80 stalker every
# ~5.5s: a deliberate, readable FF5-style ATB cadence (was 400 = ~0.4s, a blur).
gauge_fill_divisor = 4400.0
turn_timeout_ms = 15000          # 15s -> auto-defend
flee_base = 0.60
flee_penalty_per_tier = 0.10
flee_floor = 0.05
merge_cap_normal_instances = 2   # CANON D5
merge_cap_gatekeeper_instances = 4
defend_damage_reduction = 0.5    # content-defined; spike default
skill_power_mult = 1.75          # "Power Strike" skill: damage = atk*mult - def [TUNABLE]
skill_heal_fraction = 0.3        # "Second Wind" skill: heals this fraction of max HP [TUNABLE]
item_heal_fraction = 0.4         # "Salve" item: heals this fraction of max HP [TUNABLE]
                                 # "Elixir" item: full heal (structural, no coefficient)

[meld]
# Meld-skill progression. Simple linear curve for the slice; the real per-skill
# curves + recipe XP are content tables. [TUNABLE]
xp_per_level = 100
alchemy_xp_per_extracted_stack = 15   # extracting plants/monster parts (GDD §4.1)
forging_xp_per_craft = 25             # successful craft (GDD §4.1)

[combat_math]
# Damage = max(1, round(atk * stat_mult_attacker - def)). Content-defined
# formula; coefficients here. mlevel/stat_mult per world scaling.
min_damage = 1

[world_scaling]
tier_divisor = 100.0             # tier(d) = floor(d/100)
mlevel_divisor = 12.5            # mlevel(d) = max(1, round(d/12.5))
stat_mult_base_divisor = 500.0   # (1 + d/500)^exp
stat_mult_exp = 1.25
red_chest_floor_distance = 300

# Content-ish stats for the spike's one creature and the starter class.
# Tuned so a SOLO squire can win but with real tension (dawdling → death),
# while a full party wins comfortably. All [TUNABLE] — pure balance.
[creature.forest_bloom_stalker]
base_hp = 60
base_atk = 9
base_def = 2
speed_stat = 80
xp_reward = 60
encounter_class = "standard"

[player.squire]
base_hp = 40
base_atk = 12
base_def = 3
speed_stat = 110
