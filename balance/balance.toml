base_atk = 9
base_def = 2
speed_stat = 80
xp_reward = 60
encounter_class = "standard"
faction = "fungal"           # a spore-bloom stalker — rivals the forest's beasts
aggression = "territorial"
flees = false
loot_kind = "bloom_petal"

