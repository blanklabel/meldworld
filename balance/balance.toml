# MELDWORLD tunable constants (CANON.md §B / §D). Owned by T1.
#
# Working agreement #2: NO gameplay number appears as a literal in any crate.
# Formula *structure* is code; formula *coefficients* live here. Only the subset
# the today-slice actually reads is present; more land as their systems do.

[session]
heartbeat_interval_ms = 5000     # CANON D-session; realtime-protocol session.md
grace_window_ms = 10000          # CANON §B disconnect grace
auth_timeout_ms = 5000           # first message must be session.authenticate
realtime_ticket_ttl_ms = 60000   # auth-players.md: ticket expires 60s after issue

[auth]
bcrypt_cost = 12                 # CANON D17
session_token_ttl_secs = 86400   # 24h

[world]
chunk_size = 64                  # CANON §G Chunk (64x64)
interest_radius_chunks = 2       # CANON §B networking
overworld_sim_hz = 20            # CANON §B
snapshot_hz = 10                 # CANON §B
touch_radius_tiles = 1.0         # contact distance to trigger a battle (spec-defined)
interaction_radius_tiles = 2.5   # range to use a portal/drop/etc. (~2-tile, limits.md) [TUNABLE]
avatar_speed_tiles_per_sec = 6.0 # overworld walk speed (spec-defined)

[runs]
# base_run_level(hub) = round(1 + hub.distance * base_run_level_per_distance)
base_run_level_per_distance = 0.078   # CANON §B -> Center=1, D500=40
backpack_slots = 40                   # limits.md
# Extraction channel duration. Spec default is 10000 (10s, interruptible);
# shortened here for snappy runs/tests. [TUNABLE]
extraction_channel_ms = 2500
# Level curve: XP to advance from level L is xp_base * xp_growth_factor^(L-1) —
# the classic "double the requirement each level". [TUNABLE]
xp_base = 80
xp_growth_factor = 2.0
# Extraction is mostly the Town Portal item: each dive starts with this many, and
# felled creatures sometimes drop one. There is only ONE fixed portal (deep in),
# so the item is the primary way home. [TUNABLE]
starting_town_portals = 1
town_portal_drop_chance = 0.2

# How the four attributes (Str/Mnd/Dex/Wll) turn into combat stats. A hero's
# attribute = its class base + per-level gain * (level-1); the derived stat is the
# class base stat + (attribute - base attribute) * the coefficient here, so a
# level-1 hero has exactly its class base stats and each level adds growth. All
# coefficients [TUNABLE].
[attributes]
str_to_atk = 1.0        # +physical attack per Str above base (Str -> damage)
mnd_to_power = 1.2      # +manifestation/skill power per Mnd above base (Mnd -> magic dmg)
dex_to_speed = 1.5      # +ATB speed_stat per Dex above base (Dex -> act faster)
wll_to_hp = 2.5         # +max HP per Wll above base (Wll -> HP)
wll_to_def = 0.25       # +defence per Wll above base (Wll -> resistance)
dodge_dex_floor = 10    # Dex at/below this gives no dodge (every class starts here
                        # or below, so dodge is earned purely through leveling)
dodge_per_dex = 0.012   # dodge chance gained per Dex above the floor
dodge_cap = 0.35        # maximum dodge chance

[battle]
tick_ms = 100                    # CANON §B ATB tick
# gauge += speed_stat / divisor per 100ms tick; a turn fires at gauge 1.0.
# 4400 → a speed-110 squire acts every ~4.0s and the speed-80 stalker every
# ~5.5s: a deliberate, readable FF5-style ATB cadence (was 400 = ~0.4s, a blur).
gauge_fill_divisor = 4400.0
turn_timeout_ms = 15000          # 15s -> auto-defend
flee_base = 0.60
flee_penalty_per_tier = 0.10
flee_floor = 0.05
merge_cap_normal_instances = 2   # CANON D5
merge_cap_gatekeeper_instances = 4
defend_damage_reduction = 0.5    # content-defined; spike default
party_size_per_player = 4        # each player controls up to this many heroes (GDD: per-player party) [TUNABLE]
skill_power_mult = 1.75          # "Power Strike" skill: damage = atk*mult - def [TUNABLE]
skill_heal_fraction = 0.3        # "Second Wind" skill: heals this fraction of max HP [TUNABLE]
item_heal_fraction = 0.4         # "Salve" item: heals this fraction of max HP [TUNABLE]
                                 # "Elixir" item: full heal (structural, no coefficient)
# Psyker Focus system. A Psyker maintains several persistent Manifestations
# ("Foci"); on each of its ATB turns every active Focus fires, then the player
# casts/reinforces/revokes one. Focus slots and which manifestations are unlocked
# scale with level. All [TUNABLE].
psyker_focus_base = 2             # focus slots at level 1
psyker_focus_per_level = 4        # +1 slot every this many levels
psyker_focus_cap = 5             # hard cap on focus slots
# Per-tick magnitudes (multiplied by the Focus's stack count, 1–2):
psyker_gravity_tick_mult = 0.55   # Gravity Well: dmg = atk*mult*stacks (ignores def)
psyker_spike_tick_mult = 0.9      # Mind Spike: stronger armour-ignoring dmg tick
psyker_aegis_tick_fraction = 0.1  # Kinetic Aegis: Barrier granted = max_hp*frac*stacks
psyker_anchor_gauge_drain = 0.2   # Temporal Anchor: enemy ATB gauge -= drain*stacks

# Barrier (temp HP): a pool that absorbs damage before HP and decays a fixed
# amount at the start of each of the holder's turns. [TUNABLE]
barrier_decay_per_turn = 2

# The Resonant (healer). Innate Regen (HP restored at the start of each of its
# turns), plus three ally-targeting skills that auto-pick the most-wounded ally:
#   Transfuse   — heal an ally for a fraction of the Resonant's max HP, paying
#                 `cost_fraction` of that heal out of the Resonant's own HP.
#   Regen Boon  — grant an ally the Regen status.
#   Ward        — grant an ally Barrier.
# All [TUNABLE].
resonant_regen_per_turn = 3
resonant_transfuse_heal_fraction = 0.4
resonant_transfuse_cost_fraction = 0.5
resonant_boon_regen = 3
resonant_ward_barrier_fraction = 0.3

# Creature loot (economy.md sources S1). A felled encounter yields, banked into
# the run backpack and minted into the persistent economy only on extraction
# (deleted on death — it never entered circulation, economy.md I1):
#   - Chits: `round(chits_per_mlevel * mlevel(d) * monster_count * jitter)`, where
#     jitter ∈ [1-chits_jitter, 1+chits_jitter]. Deeper fights pay more.
#   - One of the biome's combat materials per felled encounter (feeds crafting;
#     biome→material map is structural, in meld-world::combat_material_for_biome).
#   - Red-chest gear (insurance:red), only at/after world_scaling.red_chest_floor_
#     distance (tier 3, d 300), dropping with `gear_drop_chance`. Rolled atk bonus
#     = `round(gear_atk_per_tier * tier(d) * jitter)`, jitter ∈ [1±gear_atk_jitter].
# All [TUNABLE] — pure balance.
[loot]
chits_per_mlevel = 5.0
chits_jitter = 0.35
gear_drop_chance = 0.35
gear_atk_per_tier = 3.0
gear_atk_jitter = 0.4
gear_base_durability = 80

[meld]
# Meld-skill progression. Simple linear curve for the slice; the real per-skill
# curves + recipe XP are content tables. [TUNABLE]
xp_per_level = 100
alchemy_xp_per_extracted_stack = 15   # extracting plants/monster parts (GDD §4.1)
forging_xp_per_craft = 25             # successful craft (GDD §4.1)

[combat_math]
# Damage = max(1, round(atk * stat_mult_attacker - def)). Content-defined
# formula; coefficients here. mlevel/stat_mult per world scaling.
min_damage = 1

[world_scaling]
tier_divisor = 100.0             # tier(d) = floor(d/100)
mlevel_divisor = 12.5            # mlevel(d) = max(1, round(d/12.5))
stat_mult_base_divisor = 500.0   # (1 + d/500)^exp
stat_mult_exp = 1.25
red_chest_floor_distance = 300

# Procedural area generation (world-generation.md subset). A MazeInstance is a
# seeded chain of biome "areas" marching east from the Center Hub. Each area has
# its own length; lengths trend larger with depth (area_length_growth) plus a
# per-area jitter, so no two areas are the same size and later ones are bigger
# on average. Monsters are spaced along the corridor; deeper (longer) areas hold
# more. All [TUNABLE] — structure is code, coefficients here (working agreement #2).
[worldgen]
area_count = 8                   # how many areas to pre-generate for the instance
base_area_length = 20.0          # tiles: length of the first (shallowest) area
area_length_growth = 7.0         # each successive area is ~this much longer on avg
area_length_jitter = 0.35        # ± fraction applied to each area's length
monster_spacing = 6.5            # avg tiles between creatures along the corridor
monster_spacing_jitter = 0.45    # ± fraction on each gap
lateral_jitter = 0.4             # creature y offset from the corridor centre-line
                                 # (kept < touch_radius so an east walk still meets it)
first_monster_x = 8.0            # the single tutorial creature (area 0) sits here
first_area_portal_gap = 6.0      # area 0's portal is this far past that creature (→ x=14)
portal_setback = 3.0             # a portal sits this many tiles before an area's end
world_margin = 10.0              # walkable distance past the final portal
lateral_half_extent = 28.0       # ±y half-height of the play area — tall enough to
                                 # scroll north/south and explore, not a thin lane
# Creatures no longer hug the centre line: from area 1 on they scatter across ±y
# so the map feels populated in every direction (area 0 stays on the line for the
# deterministic tutorial). Kept a touch inside lateral_half_extent.
creature_lateral_spread = 22.0   # ± y range creatures spawn across (areas ≥ 1)
# Harvestable resource nodes scattered through each area (biome-specific kinds).
resources_per_area = 3           # avg nodes per area
resource_lateral_spread = 22.0   # ± y range nodes scatter across

# Biome terrain: impassable obstacles (trees/cliffs/water/…) scattered per area so
# the map has real geography. A meandering CLEAR PATH is carved from the hub to the
# deep portal — obstacles never intrude within `path_clear_radius` of it, so a route
# to the exit is ALWAYS feasible. Area 0 (tutorial) stays obstacle-free. [TUNABLE]
obstacles_per_area = 14          # avg impassable features per area (areas ≥ 1)
# Every biome is a DENSE maze: procedural sections pack this multiple of
# `obstacles_per_area` EXTRA props into the play area (only the clear path + branch
# detours stay open), on a separate rng stream so world determinism is unchanged.
# Forest is densest (`forest_obstacle_mult`); other biomes use `maze_obstacle_mult`.
# [TUNABLE]
forest_obstacle_mult = 4.0
maze_obstacle_mult = 2.0         # extra prop density for non-forest biomes
obstacle_min_radius = 0.9        # smallest feature (a lone tree/rock)
obstacle_max_radius = 2.8        # largest feature (a cliff/boulder)
path_clear_radius = 4.0          # half-width of the guaranteed clear path tube
path_meander = 18.0              # how far ±y the clear path wanders between areas
player_radius = 0.5              # the avatar's collision radius vs obstacles

# Verticality: raised terraces joined to the ground by connectors (ladders/ropes/
# slopes, now weighted toward slopes/ramps). SIDE terraces are optional detours kept
# OUT of the clear-path tube (grind pockets + treasure). The CLEAR PATH itself also
# climbs: `path_climb_chance` sections raise a mid-segment plateau the route crosses
# via guaranteed ramps, with the endpoints staying on level 0 so extraction is always
# feasible. Cliffs are impassable; the only way up is a connector. All [TUNABLE].
terraces_per_area = 3.0          # avg raised SIDE terraces per section (area 0 stays flat)
max_level = 2                    # tallest terrace (levels above ground)
terrace_min_size = 6.0           # smallest terrace footprint side (tiles)
terrace_max_size = 14.0          # largest terrace footprint side (tiles)
terrain_cell = 2.0               # elevation-grid resolution (tiles per cell)
connector_radius = 2.2           # reach around a connector that permits a level change
stream_lookahead = 60.0          # generate new sections this far ahead of the frontier
path_climb_chance = 0.6          # chance a section's clear path climbs a plateau (0..1)
chest_terrace_chance = 0.5       # chance a section's chest sits atop a terrace (0..1)

# Content-ish stats per creature, keyed by content id. Bases are pre-scale; the
# world multiplies each by stat_mult(distance) at spawn, so the SAME base grows
# menacing with depth. Forest bases are tuned so a solo squire can win the first
# fight with tension; deeper biomes lean tankier / faster / harder-hitting. All
# [TUNABLE] — pure balance. Biome→creature assignment is structural (in code).
#
# --- Forest (d 0–100) ---
# Creature AI (overworld movement + encounter grouping). All [TUNABLE].
[ai]
wander_speed = 1.6            # tiles/sec for passive/idle drifting near home
chase_speed = 4.2            # tiles/sec when hunting a player
aggro_radius = 11.0          # aggressive creatures chase players within this range
territorial_aggro_radius = 5.0  # territorial creatures only chase when this close
leash_radius = 9.0           # how far a creature wanders from its spawn (home)
group_radius = 6.5           # creatures within this of the one you touch join the fight
flee_hp_fraction = 0.3       # `flees` creatures bolt from battle below this HP fraction
join_radius = 9.0            # a teammate this close to an ongoing fight may opt in to join it
skirmish_aggro_radius = 6.5  # hostile-faction creatures hunt each other within this range
skirmish_attack_range = 1.7  # ... and trade blows once this close (overworld skirmish)
skirmish_attack_interval = 0.85 # seconds between a creature's overworld blows
loot_pickup_radius = 1.9     # a player auto-collects ground loot dropped within this range

# `faction` groups creatures that get along; `aggression` drives overworld
# movement (passive = wander near home, territorial = patrol + chase if close,
# aggressive = chase players on sight); `flees` marks skittish creatures that
# bolt from a losing battle. Faction hostility lives in meld-proto::factions.
