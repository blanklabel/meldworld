# Psyker: a squishy psychic controller. Less HP and armour than a Squire, but
# its Mind Spike ignores enemy defence (so it shines where raw attacks stall,
# against armoured deep creatures) and its Psychic Barrier self-ward buys it
# survivability under the new no-free-heal attrition. [TUNABLE]
[player.psyker]
base_hp = 34
base_atk = 13
base_def = 2
speed_stat = 100
# The Psyker's whole kit scales with Mnd (manifestation power); it gains Mnd fast
# with a trickle of Dex/Wll and almost no Str. [TUNABLE]
