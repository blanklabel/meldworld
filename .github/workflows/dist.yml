# Build the self-contained QA / demo binary (the `embedded-server` feature: server
# baked in, in-memory DB, all assets embedded — see AGENTS.md) on NATIVE runners
# for each OS, so there's no flaky cross-compiling. Produces one downloadable file
# per platform, e.g. meldworld-windows-x86_64.exe.
#
# When it runs:
#   - every merge/push to `main`  → builds all three; binaries are downloadable
#     run artifacts (the "latest main" build). No Release is cut.
#   - a `v*` tag                  → same builds, plus a GitHub Release with the
#     binaries attached (see the `release` job).
#   - manual "Run workflow"       → on demand from the Actions tab.
name: dist

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    tags: ["v*"]

# Least privilege by default; the release job opts into write below.
permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            ext: ".exe"
          - os: macos-latest
            label: macos-aarch64
            ext: ""
          - os: ubuntu-latest
            label: linux-x86_64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      # Bevy's Linux build needs ALSA + udev dev headers to compile (X11 is
      # loaded at runtime via dlopen, so no dev lib needed just to build).
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      # Cache the client workspace's target/ (where the embedded-server build lands)
      # keyed off client/Cargo.lock, so repeat runs skip recompiling Bevy et al.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client

      # The self-contained build. BEVY_ASSET_PATH (client/.cargo/config.toml) points
      # bevy_embedded_assets at the assets folder, so everything embeds; the in-memory
      # DB + embedded balance mean no Postgres and no config are involved.
      - name: Build self-contained binary
        working-directory: client
        run: cargo build -p meld-client --features embedded-server --release

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "client/target/release/meld-client${{ matrix.ext }}" "dist/meldworld-${{ matrix.label }}${{ matrix.ext }}"
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: meldworld-${{ matrix.label }}
          path: dist/meldworld-${{ matrix.label }}${{ matrix.ext }}
          if-no-files-found: error

  # On a version tag, gather the per-OS binaries and attach them to a Release.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List collected binaries
        run: ls -lhR artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
